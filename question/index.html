<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening LekhaVigya...</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 60px 20px; background: #fdf6f0; }
    h2 { color: #8B3A3A; }
    p { color: #555; font-size: 15px; }
    .spinner { width: 40px; height: 40px; margin: 20px auto; border: 4px solid #f3e8e8; border-top: 4px solid #8B3A3A; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h2>📖 LekhaVigya</h2>
  <div class="spinner"></div>
  <p id="msg">Opening in app...</p>
  <script>
    var parts = window.location.pathname.split('/');
    var id = parts[parts.length - 1];
    var ua = navigator.userAgent;
    var isIOS = /iPad|iPhone|iPod/.test(ua);
    var isAndroid = /android/i.test(ua);
    var PLAY_STORE = "https://play.google.com/store/apps/details?id=com.lekha_vigya_app";
    var APP_STORE = "https://apps.apple.com/app/idYOUR_APP_ID";

    if (id && id !== 'question' && id !== 'index.html') {
      window.location.href = 'lekhavigya://question/' + id;
    }

    setTimeout(function() {
      document.getElementById('msg').textContent = 'Redirecting to store...';
      if (isIOS) {
        window.location.href = APP_STORE;
      } else {
        window.location.href = PLAY_STORE;
      }
    }, 2500);
  </script>
</body>
</html>
