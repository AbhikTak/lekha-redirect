<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening LekhaVigya...</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 60px 20px; background: #fdf6f0; }
    h2 { color: #8B3A3A; }
    p { color: #555; font-size: 15px; }
    .spinner {
      width: 40px; height: 40px; margin: 20px auto;
      border: 4px solid #f3e8e8;
      border-top: 4px solid #8B3A3A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h2>📖 LekhaVigya</h2>
  <div class="spinner"></div>
  <p id="msg">Opening in app...</p>

  <script>
    const parts = window.location.pathname.split('/');
    const id = parts[parts.length - 1];

    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /android/i.test(ua);

    const PLAY_STORE = "https://play.google.com/store/apps/details?id=com.lekha_vigya_app";
    const APP_STORE  = "https://apps.apple.com/app/lekhavigya/id123456789"; // iOS publish hone ke baad update karna

    // Step 1: Deep link try karo
    if (id && id !== 'question') {
      window.location.href = `lekhavigya://question/${id}`;
    }

    // Step 2: 2.5 sec baad app nahi mila → seedha store pe bhejo
    setTimeout(() => {
      document.getElementById('msg').textContent = 'Redirecting to store...';

      if (isIOS) {
        window.location.href = APP_STORE;
      } else if (isAndroid) {
        window.location.href = PLAY_STORE;
      } else {
        // Desktop: Play Store hi dikhao
        window.location.href = PLAY_STORE;
      }
    }, 2500);
  </script>
</body>
</html>
